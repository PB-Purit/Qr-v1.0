<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <p class="eyebrow">QR · Generator &amp; Services</p>
      <h1>QR Generator </h1>
    </div>
    <div class="header-actions">
      <button class="menu-toggle" id="pdaMenuToggle" aria-expanded="false" aria-controls="pdaMenu" aria-label="เปิดเมนู PDA">
        <span></span><span></span><span></span>
      </button>
      <div class="pda-menu" id="pdaMenu">
        <div class="pda-item" onclick="togglePdaMenu(false);openPdaModal(0)">
          <div class="pda-qr-mini" id="pda-mini-0"></div>
          <span class="pda-num">PDA Log</span>
        </div>
        <div class="pda-item" onclick="togglePdaMenu(false);openPdaModal(1)">
          <div class="pda-qr-mini" id="pda-mini-1"></div>
          <span class="pda-num">PDA 1</span>
        </div>
        <div class="pda-item" onclick="togglePdaMenu(false);openPdaModal(2)">
          <div class="pda-qr-mini" id="pda-mini-2"></div>
          <span class="pda-num">PDA 2</span>
        </div>
        <div class="pda-item" onclick="togglePdaMenu(false);openPdaModal(3)">
          <div class="pda-qr-mini" id="pda-mini-3"></div>
          <span class="pda-num">C ice</span>
        </div>
      </div>
    </div>
  </header>

<!-- PDA MODAL -->
<div class="pda-overlay" id="pdaOverlay">
  <div class="pda-modal">
    <button class="pda-modal-close" onclick="closePdaModal()">&times;</button>
    <div class="pda-modal-tag" id="pdaModalTag"></div>
    <p class="pda-modal-id" id="pdaModalId"></p>
    <div class="qr-box" id="pdaModalQr"></div>
    <button class="btn btn-ghost" style="font-size:13px;padding:10px;width:100%;" onclick="downloadPdaQr()">ดาวน์โหลด PNG</button>
  </div>
</div>

  <div class="section-label"><span class="num">1</span><h2>สร้าง QR Code เอง</h2></div>
  <div class="gen-card">
    <div class="gen-row">
      <input type="text" id="customInput" placeholder="พิมพ์ข้อความ ตัวเลข หรือลิงก์...">
      <button class="btn btn-amber" id="genBtn">สร้าง QR Code</button>
    </div>
    <p class="err" id="genErr">กรุณาพิมพ์ข้อความหรือตัวเลขก่อนสร้าง QR Code</p>
    <div class="gen-result" id="genResult">
      <div class="qr-box" id="genQrBox"></div>
      <div class="gen-result-info">
        <p class="val-label">เนื้อหา QR Code</p>
        <p class="val" id="genValText"></p>
        <button class="btn btn-ghost" id="genDownload">ดาวน์โหลด PNG</button>
      </div>
    </div>
  </div>

  <div class="section-label"><span class="num">2</span><h2>รายการลิงก์อ้างอิง · จุดบริการ</h2></div>
  <div class="grid" id="directoryGrid"></div>

  <footer>
    <div class="footer-content">
      <span class="footer-version">V.1.0</span>
      <span>QR Code Generator Make By Leo🤭🎉</span>
      <span class="visit-count" id="visitCount">ยอดเข้าชม: 0</span>
    </div>
  </footer>
</div>

<!-- Directory Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="modalClose" aria-label="ปิด">&times;</button>
    <div class="modal-num" id="modalNum"></div>
    <p class="modal-label" id="modalLabel"></p>
    <div class="qr-box" id="modalQrBox"></div>
    <p class="modal-url" id="modalUrl"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalDownload">ดาวน์โหลด</button>
      <button class="btn btn-amber" id="modalOpen">เปิดลิงก์</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
