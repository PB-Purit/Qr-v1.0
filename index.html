<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#161616;
    --panel:#1f1f22;
    --panel-2:#26262a;
    --border:#323236;
    --amber:#FFB000;
    --amber-dim:#5c4012;
    --teal:#2BB3A3;
    --text:#F4F2ED;
    --text-dim:#9A9A9E;
    --text-faint:#6c6c70;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter','Noto Sans Thai',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:980px;margin:0 auto;padding:32px 20px 80px;}

  /* ---- Header ---- */
  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    border-bottom:2px solid var(--border);
    padding-bottom:20px;
    margin-bottom:32px;
    flex-wrap:wrap;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:.12em;
    color:var(--amber);
    text-transform:uppercase;
    margin:0 0 6px;
  }
  h1{
    font-family:'Oswald','Noto Sans Thai',sans-serif;
    font-weight:700;
    font-size:30px;
    letter-spacing:.01em;
    margin:0;
    text-transform:uppercase;
  }
  .plate{
    width:54px;height:54px;
    border:2px solid var(--amber);
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-weight:700;font-size:13px;
    color:var(--amber);
    transform:rotate(-3deg);
    flex-shrink:0;
  }

  /* ---- Section labels ---- */
  .section-label{
    display:flex;align-items:center;gap:10px;
    margin:0 0 16px;
  }
  .section-label .num{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;color:var(--bg);
    background:var(--amber);
    width:22px;height:22px;border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;
  }
  .section-label h2{
    font-family:'Oswald','Noto Sans Thai',sans-serif;
    font-size:16px;font-weight:600;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin:0;
  }

  /* ---- Generator card ---- */
  .gen-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:24px;
    margin-bottom:48px;
  }
  .gen-row{
    display:flex;gap:10px;flex-wrap:wrap;
    margin-bottom:20px;
  }
  .gen-row input{
    flex:1;min-width:200px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:13px 14px;
    color:var(--text);
    font-size:15px;
    font-family:'Inter','Noto Sans Thai',sans-serif;
  }
  .gen-row input::placeholder{color:var(--text-faint);}
  .gen-row input:focus{outline:none;border-color:var(--amber);}
  .btn{
    border:none;border-radius:8px;
    padding:13px 22px;
    font-family:'Inter','Noto Sans Thai',sans-serif;
    font-weight:600;font-size:14px;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-amber{background:var(--amber);color:#1a1300;}
  .btn-amber:hover{opacity:.9;}
  .btn-ghost{
    background:transparent;border:1px solid var(--border);color:var(--text);
  }
  .btn-ghost:hover{border-color:var(--text-dim);}
  .btn[disabled]{opacity:.4;cursor:not-allowed;}

  .gen-result{
    display:none;
    align-items:center;
    gap:24px;
    flex-wrap:wrap;
    padding-top:20px;
    border-top:1px solid var(--border);
  }
  .gen-result.show{display:flex;}
  .qr-box{
    background:#fff;
    padding:14px;
    border-radius:10px;
    line-height:0;
    flex-shrink:0;
  }
  .gen-result-info{flex:1;min-width:180px;}
  .gen-result-info .val-label{
    font-size:12px;color:var(--text-faint);
    font-family:'JetBrains Mono',monospace;
    letter-spacing:.06em;text-transform:uppercase;
    margin:0 0 4px;
  }
  .gen-result-info .val{
    font-size:15px;color:var(--text);
    word-break:break-all;
    margin:0 0 16px;
    font-family:'JetBrains Mono',monospace;
  }
  .err{
    color:#ff6b6b;font-size:13px;margin:0 0 12px;
    display:none;
  }
  .err.show{display:block;}

  /* ---- Directory grid ---- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:14px;
  }
  .tile{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 14px;
    cursor:pointer;
    transition:border-color .15s ease, transform .12s ease;
    display:flex;flex-direction:column;gap:14px;
    text-align:left;
  }
  .tile:hover{border-color:var(--amber);transform:translateY(-2px);}
  .tile:active{transform:translateY(0) scale(.98);}
  .tile-num{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;font-size:13px;
    color:var(--amber);
    background:var(--amber-dim);
    width:fit-content;
    padding:3px 9px;
    border-radius:5px;
    letter-spacing:.04em;
  }
  .tile-label{
    font-family:'Noto Sans Thai',sans-serif;
    font-weight:600;font-size:15px;
    color:var(--text);
    line-height:1.3;
  }

  /* ---- Modal ---- */
  .overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,.7);
    align-items:center;justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:28px;
    max-width:380px;width:100%;
    text-align:center;
    position:relative;
  }
  .modal-close{
    position:absolute;top:14px;right:14px;
    background:none;border:none;
    color:var(--text-dim);
    font-size:20px;cursor:pointer;
    width:32px;height:32px;
    border-radius:8px;
    line-height:1;
  }
  .modal-close:hover{background:var(--panel-2);color:var(--text);}
  .modal-num{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;font-size:13px;
    color:var(--amber);
    background:var(--amber-dim);
    display:inline-block;
    padding:3px 9px;border-radius:5px;
    margin-bottom:10px;
  }
  .modal-label{
    font-family:'Noto Sans Thai',sans-serif;
    font-weight:700;font-size:19px;
    margin:0 0 18px;
  }
  .modal .qr-box{margin:0 auto 18px;display:inline-flex;}
  .modal-url{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;color:var(--text-faint);
    word-break:break-all;
    margin:0 0 20px;
  }
  .modal-actions{display:flex;gap:10px;}
  .modal-actions .btn{flex:1;}

  footer{
    margin-top:56px;
    padding-top:20px;
    border-top:1px solid var(--border);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:.04em;
    text-align:center;
  }

  @media (max-width:480px){
    h1{font-size:22px;}
    .gen-result{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <p class="eyebrow">QR · Generator &amp; ผังจุดบริการ</p>
      <!-- <h1>QR Code Tool</h1> -->
    </div>
    <div class="plate">QR</div>
  </header>

  <!-- Custom generator -->
  <div class="section-label"><span class="num">1</span><h2>สร้าง QR Code เอง</h2></div>
  <div class="gen-card">
    <div class="gen-row">
      <input type="text" id="customInput" placeholder="พิมพ์ข้อความ ตัวเลข หรือลิงก์...">
      <button class="btn btn-amber" id="genBtn">สร้าง QR Code</button>
    </div>
    <p class="err" id="genErr">กรุณาพิมพ์ข้อความหรือตัวเลขก่อนสร้าง QR Code</p>
    <div class="gen-result" id="genResult">
      <div class="qr-box" id="genQrBox"></div>
      <div class="gen-result-info">
        <p class="val-label">เนื้อหา QR Code</p>
        <p class="val" id="genValText"></p>
        <button class="btn btn-ghost" id="genDownload">ดาวน์โหลด PNG</button>
      </div>
    </div>
  </div>

  <!-- Directory -->
  <div class="section-label"><span class="num">2</span><h2>รายการลิงก์อ้างอิง · จุดบริการ</h2></div>
  <div class="grid" id="directoryGrid"></div>

  <footer>QR Code Generator Make By Leo🤭🎉 </footer>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="modalClose" aria-label="ปิด">&times;</button>
    <div class="modal-num" id="modalNum"></div>
    <p class="modal-label" id="modalLabel"></p>
    <div class="qr-box" id="modalQrBox"></div>
    <p class="modal-url" id="modalUrl"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalDownload">ดาวน์โหลด</button>
      <button class="btn btn-amber" id="modalOpen">เปิดลิงก์</button>
    </div>
  </div>
</div>

<script>
const directory = [
  { num: "01", label: "อุปกรณ์ไฟฟ้า", url: "https://surl.li/snjgbf" },
  { num: "02", label: "ห้องลองชุด",   url: "https://surl.li/taymce" },
  { num: "03", label: "ขนม",          url: "https://surl.lt/ttrqnm" },
  { num: "04", label: "ร้านทอง",      url: "https://surl.li/lfkwln" },
  { num: "05", label: "ห้องน้ำ",      url: "https://surl.li/wrfvbk" },
  { num: "06", label: "พนง",          url: "https://surl.li/xsrvdj" },
  { num: "07", label: "Stock",        url: "https://surl.li/dnzrgz" },
  { num: "08", label: "FF",           url: "https://surl.li/lrdbbw" },
  { num: "09", label: "Door Amazon",  url: "https://surl.li/awrvpv" },
  { num: "10", label: "Food court",         url: "https://surl.li/spwrzh" },
  { num: "G.01", label: "ร้านทอง",          url: "https://surl.li/gviqqp" },
  { num: "S.01", label: "Random Saving Petty cash", url: "https://surl.li/zhmlzq" },
];

function renderQR(container, text){
  container.innerHTML = "";
  new QRCode(container, {
    text: text,
    width: 200,
    height: 200,
    colorDark: "#161616",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
}

function getCanvasDataUrl(container){
  const canvas = container.querySelector("canvas");
  if (canvas) return canvas.toDataURL("image/png");
  const img = container.querySelector("img");
  return img ? img.src : null;
}

function downloadFromBox(container, filename){
  setTimeout(() => {
    const dataUrl = getCanvasDataUrl(container);
    if (!dataUrl) return;
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = filename.endsWith(".png") ? filename : filename + ".png";
    document.body.appendChild(a);
    a.click();
    a.remove();
  }, 50);
}

/* ---- Custom generator ---- */
const customInput = document.getElementById("customInput");
const genBtn = document.getElementById("genBtn");
const genErr = document.getElementById("genErr");
const genResult = document.getElementById("genResult");
const genQrBox = document.getElementById("genQrBox");
const genValText = document.getElementById("genValText");
const genDownload = document.getElementById("genDownload");

function generateCustom(){
  const val = customInput.value.trim();
  if (!val){
    genErr.classList.add("show");
    genResult.classList.remove("show");
    return;
  }
  genErr.classList.remove("show");
  renderQR(genQrBox, val);
  genValText.textContent = val;
  genResult.classList.add("show");
}

genBtn.addEventListener("click", generateCustom);
customInput.addEventListener("keydown", (e) => { if (e.key === "Enter") generateCustom(); });
genDownload.addEventListener("click", () => downloadFromBox(genQrBox, "qrcode-custom"));

/* ---- Directory grid ---- */
const grid = document.getElementById("directoryGrid");
directory.forEach((item) => {
  const tile = document.createElement("button");
  tile.className = "tile";
  tile.innerHTML = `<span class="tile-num">${item.num}</span><span class="tile-label">${item.label}</span>`;
  tile.addEventListener("click", () => openModal(item));
  grid.appendChild(tile);
});

/* ---- Modal ---- */
const overlay = document.getElementById("overlay");
const modalNum = document.getElementById("modalNum");
const modalLabel = document.getElementById("modalLabel");
const modalQrBox = document.getElementById("modalQrBox");
const modalUrl = document.getElementById("modalUrl");
const modalDownload = document.getElementById("modalDownload");
const modalOpen = document.getElementById("modalOpen");
const modalClose = document.getElementById("modalClose");
let currentItem = null;

function openModal(item){
  currentItem = item;
  modalNum.textContent = item.num;
  modalLabel.textContent = item.label;
  modalUrl.textContent = item.url;
  renderQR(modalQrBox, item.url);
  overlay.classList.add("show");
}
function closeModal(){
  overlay.classList.remove("show");
  currentItem = null;
}
modalClose.addEventListener("click", closeModal);
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });
modalDownload.addEventListener("click", () => {
  if (currentItem) downloadFromBox(modalQrBox, "qrcode-" + currentItem.num);
});
modalOpen.addEventListener("click", () => {
  if (currentItem) window.open(currentItem.url, "_blank");
});
</script>
</body>
</html>
